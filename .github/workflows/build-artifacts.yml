name: Build Release Artifacts

on:
  workflow_dispatch:
    inputs:
      manual_version:
        description: 'Optional release version override (default: auto-generated)'
        required: false

permissions:
  contents: read

jobs:
  build_artifacts:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Determine version number
      id: version
      run: |
        # Get the current date in YYMMDD format
        DATE_TAG=$(date +'%y%m%d')
        
        # If manual version is provided, use it
        if [[ -n "${{ github.event.inputs.manual_version }}" ]]; then
          echo "version=${{ github.event.inputs.manual_version }}" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # Get latest version tag
        LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+' | head -n 1 || echo "v0.0")
        
        # Extract major and minor version
        if [[ $LATEST_TAG =~ ^v([0-9]+)\.([0-9]+) ]]; then
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          # Increment minor version
          MINOR=$((MINOR + 1))
        else
          # Default version if no tag exists
          MAJOR=0
          MINOR=1
        fi
        
        VERSION="v$MAJOR.$MINOR.$DATE_TAG"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"
    - name: Restore dependencies
      run: dotnet restore src/Microsoft.CloudHealth.PreviewMigration.csproj

    - name: Publish Windows
      run: dotnet publish src/Microsoft.CloudHealth.PreviewMigration.csproj --configuration Release -o publish/win-x64 --self-contained -r win-x64 -p:PublishSingleFile=true

    - name: Publish macOS
      run: dotnet publish src/Microsoft.CloudHealth.PreviewMigration.csproj --configuration Release -o publish/osx-x64 --self-contained -r osx-x64 -p:PublishSingleFile=true

    - name: Zip Windows release assets
      run: |
        cd publish/win-x64
        zip -r ../../AzureMonitorHealthModels-migration-utility-win-x64-${{ steps.version.outputs.version }}.zip *
    - name: Zip macOS release assets
      run: |
        cd publish/osx-x64
        zip -r ../../AzureMonitorHealthModels-migration-utility-osx-x64-${{ steps.version.outputs.version }}.zip *
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release-${{ steps.version.outputs.version }}
        path: ./AzureMonitorHealthModels-migration-utility-win-x64-${{ steps.version.outputs.version }}.zip

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-release-${{ steps.version.outputs.version }}
        path: ./AzureMonitorHealthModels-migration-utility-osx-x64-${{ steps.version.outputs.version }}.zip

    - name: Summary
      run: |
        echo "## Release Artifacts Built! 🎉" >> $GITHUB_STEP_SUMMARY
        echo "Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the artifacts above and manually create a release with tag: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
