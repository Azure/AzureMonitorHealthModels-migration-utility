name: PR Validation

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore src/Microsoft.CloudHealth.PreviewMigration.csproj
      
    - name: Build
      run: dotnet build src/Microsoft.CloudHealth.PreviewMigration.csproj --configuration Release --no-restore
